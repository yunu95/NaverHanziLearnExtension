<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Naver Hanzi Redirect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-width: 260px;
            margin: 12px;
            background: #fff3cd;
            color: #7a1f1f;
            border: 4px solid #d62828;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px;
            color: #d62828;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            resize: vertical;
            border: 2px solid #d62828;
            background: #fffdf7;
        }

        button {
            width: 100%;
            padding: 8px 12px;
            border: 0;
            background: #d62828;
            color: #ffffff;
            font-weight: bold;
        }

        .reload-marker {
            margin: 0 0 12px;
            padding: 8px 10px;
            background: #d62828;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>
    <h1>Naver Hanzi Dictionary</h1>
    <div class="reload-marker">RELOAD CHECK VERSION</div>
    <textarea id="hanziList" rows="10" cols="30" placeholder="Enter Hanzis separated by commas"></textarea>
    <button id="save">Save Hanzis</button>
    <script src="popup.js"></script>
</body>
</html>
