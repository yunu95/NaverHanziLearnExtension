<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>네이버 한자 사전</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-width: 260px;
            margin: 12px;
            background: #fff3cd;
            color: #7a1f1f;
            border: 4px solid #d62828;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px;
            color: #d62828;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            resize: vertical;
            border: 2px solid #d62828;
            background: #fffdf7;
        }

        textarea:disabled {
            background: #ede0c4;
            color: #9e7b4a;
            cursor: not-allowed;
            border-color: #c4a46a;
        }

        .textarea-label {
            font-size: 12px;
            font-weight: bold;
            color: #7a1f1f;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button {
            width: 100%;
            padding: 8px 12px;
            border: 0;
            background: #d62828;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        button:hover {
            background: #b71c1c;
        }

        button:active {
            background: #7a1f1f;
            transform: scale(0.97);
        }

        #goToLastHanzi {
            margin-top: 8px;
            background: #7a1f1f;
        }

        #goToLastHanzi:hover {
            background: #5a1515;
        }

        #goToLastHanzi:active {
            background: #3b0d0d;
            transform: scale(0.97);
        }

        #lastHanziInfo {
            margin-top: 8px;
            font-size: 13px;
            color: #7a1f1f;
            text-align: center;
            min-height: 18px;
        }

        #presetBar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .preset-btn {
            width: auto;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 3px;
        }

        .preset-default {
            background: #7a1f1f;
        }

        .preset-default:hover {
            background: #5a1515;
        }

        .preset-default:active {
            background: #3b0d0d;
            transform: scale(0.97);
        }

        .preset-item {
            display: inline-flex;
        }

        .preset-name {
            background: #7a1f1f;
            border-radius: 3px 0 0 3px;
        }

        .preset-name:hover {
            background: #5a1515;
        }

        .preset-name:active {
            background: #3b0d0d;
        }

        .preset-rename {
            background: #7a1f1f;
            border-radius: 0;
            border-left: 1px solid rgba(255,255,255,0.25);
            padding: 4px 7px;
            font-size: 11px;
        }

        .preset-rename:hover {
            background: #5a1515;
        }

        .preset-rename:active {
            background: #3b0d0d;
        }

        .preset-delete {
            background: #7a1f1f;
            border-radius: 0 3px 3px 0;
            border-left: 1px solid rgba(255,255,255,0.25);
            padding: 4px 8px;
            font-size: 13px;
            line-height: 1;
        }

        .preset-delete:hover {
            background: #5a1515;
        }

        .preset-delete:active {
            background: #3b0d0d;
        }

        .preset-default.preset-active {
            background: #d62828;
        }

        .preset-item.preset-active .preset-name,
        .preset-item.preset-active .preset-rename,
        .preset-item.preset-active .preset-delete {
            background: #d62828;
        }

        .preset-add {
            background: transparent;
            border: 2px dashed #d62828;
            color: #d62828;
            padding: 2px 10px;
        }

        .preset-add:hover {
            background: #fde8e8;
            transform: none;
        }

        .preset-add:active {
            background: #f9c4c4;
            transform: scale(0.97);
        }

    </style>
</head>
<body>
    <h1>네이버 한자 사전</h1>
    <span class="textarea-label">학습할 한자 목록</span>
    <textarea id="hanziList" rows="10" cols="30" placeholder="한자를 쉼표로 구분하여 입력하세요"></textarea>
    <div id="presetBar"></div>
    <div id="lastHanziInfo"></div>
    <button id="goToLastHanzi">마지막 학습 한자로 이동</button>
    <script src="popup.js"></script>
</body>
</html>
