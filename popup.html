<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>네이버 한자 사전</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-width: 260px;
            margin: 12px;
            background: #fff3cd;
            color: #7a1f1f;
            border: 4px solid #d62828;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px;
            color: #d62828;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            resize: vertical;
            border: 2px solid #d62828;
            background: #fffdf7;
        }

        .textarea-label {
            font-size: 12px;
            font-weight: bold;
            color: #7a1f1f;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button {
            width: 100%;
            padding: 8px 12px;
            border: 0;
            background: #d62828;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        button:hover {
            background: #b71c1c;
        }

        button:active {
            background: #7a1f1f;
            transform: scale(0.97);
        }

        #goToLastHanzi {
            margin-top: 8px;
            background: #7a1f1f;
        }

        #goToLastHanzi:hover {
            background: #5a1515;
        }

        #goToLastHanzi:active {
            background: #3b0d0d;
            transform: scale(0.97);
        }

        #lastHanziInfo {
            margin-top: 8px;
            font-size: 13px;
            color: #7a1f1f;
            text-align: center;
            min-height: 18px;
        }

    </style>
</head>
<body>
    <h1>네이버 한자 사전</h1>
    <span class="textarea-label">학습할 한자 목록</span>
    <textarea id="hanziList" rows="10" cols="30" placeholder="한자를 쉼표로 구분하여 입력하세요"></textarea>
    <button id="save">한자 저장</button>
    <div id="lastHanziInfo"></div>
    <button id="goToLastHanzi">마지막 학습 한자로 이동</button>
    <script src="popup.js"></script>
</body>
</html>
